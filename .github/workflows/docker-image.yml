name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set Gemini cli version
      id: gemini_version
      run: echo "::set-output name=gemini_version::0.35.3"
    - name: Output docker image id with gemini version
      run: echo "peez/gemini-cli:${{ steps.gemini_version.outputs.gemini_version }}"
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          gemini_version=${{ steps.gemini_version.outputs.gemini_version }}
        tags: peez/gemini-cli:latest, peez/gemini-cli:${{ steps.gemini_version.outputs.gemini_version }}
